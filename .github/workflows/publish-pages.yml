name: Release

on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  guard:
    name: Check Release Tag
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy: ${{ steps.release-check.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check release tag
        id: release-check
        run: |
          deploy=true
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            git fetch --tags
            if [ -z "$(git tag --points-at HEAD --list "v*")" ]; then
              deploy=false
            fi
          fi
          echo "deploy=${deploy}" >> "$GITHUB_OUTPUT"

  docker:
    name: Docker Build and Push
    needs: guard
    if: needs.guard.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
        run: mise run build-image-push

  pages:
    name: Publish GitHub Pages
    needs: guard
    if: needs.guard.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Generate pages
        run: mise run generate-all-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exported-html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
